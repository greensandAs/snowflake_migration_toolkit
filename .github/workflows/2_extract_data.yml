name: 2. Extract Data

on: 
  workflow_dispatch:

jobs:
  extract-data:
    runs-on: ubuntu-latest
    
    # Required to allow GitHub Actions to push the CSVs back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        # Removed pandas since we do server-side unloading natively
        run: pip install snowflake-connector-python

      - name: Run Data Export Script
        env:
          # --- Secrets ---
          SOURCE_PASSWORD: ${{ secrets.SOURCE_PASSWORD }}
          
          # --- Variables ---
          SOURCE_ACCOUNT: ${{ vars.SOURCE_ACCOUNT }}
          SOURCE_USER: ${{ vars.SOURCE_USER }}
          SOURCE_ROLE: ${{ vars.SOURCE_ROLE }}
          SOURCE_WAREHOUSE: ${{ vars.SOURCE_WAREHOUSE }}
          SOURCE_DATABASE: ${{ vars.SOURCE_DATABASE }}
          SOURCE_SCHEMA: ${{ vars.SOURCE_SCHEMA }}
        run: python scripts/python/mig_dml_export.py

      - name: Commit and Push Data Files
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # --- THE FIX ---
          # Use --force to override .gitignore rules!
          git add --force data_exports/
          
          # Debugging: This will print exactly what files Git found
          git status
          
          # Commit and Push
          git commit -m "chore: Auto-generated Data extraction [skip ci]" || echo "No changes to commit"
          git push
